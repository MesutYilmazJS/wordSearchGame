<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Kelime Avı - Seviyeli Bulmaca</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-Bl96FERJ.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DWYopHxq.css">
</head>

<body
  class="bg-gradient-to-br from-slate-50 to-blue-100 min-h-screen font-sans text-slate-800 flex flex-col items-center py-8 px-4 select-none touch-pan-y">

  <!-- Header / Level Info -->
  <header class="w-full max-w-4xl flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Kelime Avı</h1>
      <p class="text-slate-500 text-sm mt-1">Kelimeleri bul, seviyeleri tamamla.</p>
    </div>
    <div class="flex items-center gap-4">
      <div class="bg-white/80 backdrop-blur px-4 py-2 rounded-xl shadow-sm border border-white/50">
        <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Seviye</span>
        <div class="text-2xl font-bold text-brand-600 leading-none" id="seviyeGostergesi">1</div>
      </div>
    </div>
  </header>

  <!-- Main Game Area -->
  <main class="w-full max-w-5xl flex flex-col lg:flex-row gap-8 items-start justify-center">

    <!-- Board Container -->
    <div class="relative group w-full lg:w-auto flex justify-center">
      <!-- Board Background -->
      <div
        class="bg-white p-4 md:p-6 rounded-3xl shadow-2xl shadow-blue-900/10 border border-slate-100 w-full max-w-[600px]">
        <div id="tahta" class="grid gap-1 md:gap-1.5 mx-auto touch-none"></div>
      </div>

      <!-- Level Complete MODAL -->
      <div id="seviyeSonuModal"
        class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm rounded-3xl z-20 flex-col items-center justify-center text-center p-6 animate-fade-in shadow-xl">
        <div
          class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6 text-4xl shadow-inner animate-bounce">
          🎉</div>
        <h2 class="text-3xl font-bold text-slate-900 mb-2">Harika!</h2>
        <p class="text-slate-600 mb-8 max-w-xs mx-auto">Tüm kelimeleri buldun ve seviyeyi tamamladın.</p>
        <button id="sonrakiSeviyeBtn"
          class="bg-brand-600 hover:bg-brand-700 text-white font-bold py-4 px-10 rounded-2xl shadow-xl shadow-brand-500/30 transition transform hover:scale-105 active:scale-95 text-lg w-full max-w-xs">
          Sonraki Seviye
        </button>
      </div>
    </div>

    <!-- Side Panel -->
    <div class="w-full lg:w-80 flex flex-col gap-6">

      <!-- Word List -->
      <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 flex-1">
        <div class="flex justify-between items-baseline mb-4">
          <h3 class="text-lg font-bold text-slate-800">Bulunacaklar</h3>
          <span id="kalanKelimeSayisi"
            class="text-xs font-medium bg-slate-100 text-slate-600 px-2 py-1 rounded-md"></span>
        </div>
        <div id="kelimeler" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Controls -->
      <div class="grid grid-cols-2 gap-3">
        <button id="karistirDugme"
          class="flex items-center justify-center gap-2 bg-white hover:bg-slate-50 text-slate-700 font-medium py-3 px-4 rounded-xl border border-slate-200 shadow-sm transition-all text-sm active:bg-slate-100">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16v5h-5" />
            <path d="M3 8v5h5" />
            <path d="M21 21l-4.22-4.22" />
            <path d="M3 3l4.22 4.22" />
            <path d="M9 13a5 5 0 0 1-3.6-8.4" />
            <path d="M15 11a5 5 0 0 1 3.6 8.4" />
          </svg>
          Yenile
        </button>
        <button id="ipucuDugme"
          class="flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-medium py-3 px-4 rounded-xl border border-indigo-100 shadow-sm transition-all text-sm active:bg-indigo-200">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <path d="M12 17h.01" />
          </svg>
          İpucu
        </button>
      </div>

      <div class="text-xs text-slate-400 text-center leading-relaxed px-4 opacity-70">
        <p>Sürükle bırak ile kelimeleri birleştir.</p>
      </div>

    </div>
  </main>
</body>

</html>
